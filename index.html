<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar SORVIL</title>
    <link rel="stylesheet" href="default.css" >
    <link rel="stylesheet" href="login.css">
</head>
<body class="page-default">


    <div class="main_box">
        <div class="login-form1 ">
            <div class="logo1"><img src="imagens/sorvil_cut.png" alt="" style="width: 100%;" ></div>
            
            <div class="text"><p>Fazer login</p></div>
            
        
            <div class="terms_conditions"><p>Ao continuar, você concorda com as 
                <a href="">Condições de Uso</a> da Sorvil. Por favor verifique a 
                <a href="">Notificação de Privacidade</a>, 
                <a href="">Notificação de Cookies</a> e a 
                <a href="">Notificação de Anúncios Baseados em Interesse</a>.</p>
            </div>
        
        </div>
        
        
        
        
        <div class="login-form">
            
                
                <div class="form_div_a">
                    <form action="">
                        <div>
                            <div class="label_email"><label for="email" >E-mail</label></div>
                            <input class="inputs" type="text" placeholder="Digite seu email">
                        
                        
                            <div class="label_senha"><label for="password" >Senha</label></div>
                            <input class="inputs" type="password" placeholder="Digite sua senha">

                            <hr class="line">

                            
                            <div><a href="tela-principal/main_page.html" class="s_button login_button">Entrar</a></div>
                        
                        </div>
                    </form>

                    <div class="pass_recover"><p><a href="formularios/forgot_pass">Esqueceu a senha?</a></p></div>

                    <hr class="line">

                    <div><a href="sign_up.html" class="s_button register_button">Cadastre-se</a></div>
                </div>

                
               
            
        </div>
    </div>
    

</body>
</html>
